services:
  pkarr-relay:
    build: .
    
    # need both TCP and UDP
    ports:
      - "6881:6881/tcp"
      - "6881:6881/udp"
    
    volumes:
      # config file
      - ./relay/src/config.example.toml:/config.toml:ro
      # pkarr cache location, must match [cache].path in config
      - pkarr-cache:/cache

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6881/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pkarr-cache:
